<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Credit Risk Analyzer">
  <!-- Soft rounded square background with intentionally uneven corner radii
       so it does not feel perfectly geometric. -->
  <path
    d="M14 6 Q6 6 6 15 L6 49 Q6 58 15 58 L48 58 Q58 58 58 49 L58 14 Q58 7 49 6 Z"
    fill="#0b1230"
    stroke="#1a2548"
    stroke-width="1.4"
  />

  <!-- Broken baseline — a sketched ground line with a deliberate gap,
       like a pen lift-off. -->
  <path
    d="M13 47 L25 47 M29 47 L51 47"
    stroke="#3b82ff"
    stroke-opacity="0.4"
    stroke-width="1.6"
    stroke-linecap="round"
  />

  <!-- Loose, slightly wobbly chart line: hand-drawn upward trend.
       Bezier curves keep it organic and asymmetric. -->
  <path
    d="M14 42 C 19 39, 23 41, 27 33 S 33 23, 38 24 S 47 17, 50 13"
    fill="none"
    stroke="#7afcb1"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Ink-dot data points (irregular sizes, like marker bleed). -->
  <circle cx="27" cy="33" r="2.2" fill="#34e89f" />
  <circle cx="38" cy="24" r="2.0" fill="#34e89f" />
  <circle cx="50" cy="13" r="3.1" fill="#34e89f" />
  <circle cx="50" cy="13" r="6" fill="#34e89f" fill-opacity="0.18" />
</svg>
